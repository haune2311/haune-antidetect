name: publish

# Publishes BOTH clients via OIDC Trusted Publishing (no long-lived API keys):
#   - Python  -> PyPI   (pypa/gh-action-pypi-publish, id-token)
#   - .NET    -> NuGet  (NuGet/login OIDC -> short-lived key)
# Trigger: publishing a GitHub Release, or the manual "Run workflow" button.
# Prereqs (one-time): register the Trusted Publisher on pypi.org and nuget.org for this
# repo + workflow file (publish.yml), and set the Actions variable NUGET_USER.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC — PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist ./python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  nuget:
    name: Publish .NET to NuGet
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC — NuGet Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Pack
        run: dotnet pack clients/dotnet/Haune.csproj -c Release -o nupkg
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push
        run: dotnet nuget push nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
